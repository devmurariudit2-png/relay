name: Relay CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Missing Bindings
        run: npm install @rolldown/binding-linux-x64-gnu --no-save -w Relay-main

      - name: Run Backend Tests
        run: npm test -w Relay-main
        env:
          SUPABASE_URL: http://localhost:54321
          SUPABASE_SERVICE_ROLE_KEY: dummy_key

  e2e-tests:
    name: Run Playwright E2E Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright
        run: npm install @playwright/test --no-save

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Install frontend native bindings
        run: npm install @rollup/rollup-linux-x64-gnu lightningcss-linux-x64-gnu @tailwindcss/oxide-linux-x64-gnu --no-save -w frontend

      - name: Run Playwright Tests
        run: npx playwright test
        env:
          VITE_SUPABASE_URL: http://localhost:54321
          VITE_SUPABASE_ANON_KEY: dummy_key

  deploy-database:
    name: Push Database Migrations
    runs-on: ubuntu-latest
    needs: [test, e2e-tests]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Push Migrations to Production
        run: supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

  deploy-infrastructure:
    name: Trigger Vercel & Render Webhooks
    runs-on: ubuntu-latest
    needs: deploy-database
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Trigger Frontend Deploy (Vercel)
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            curl -X POST ${{ secrets.VERCEL_DEPLOY_WEBHOOK_PROD }}
          else
            curl -X POST ${{ secrets.VERCEL_DEPLOY_WEBHOOK_STAGING }}
          fi

      - name: Trigger Backend Deploy (Render)
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
            curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK_PROD }}
          else
            curl -X POST ${{ secrets.RENDER_DEPLOY_WEBHOOK_STAGING }}
          fi
