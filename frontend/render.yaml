services:
  - type: web
    name: reconciler-frontend
    runtime: static
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set this to your backend URL in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
